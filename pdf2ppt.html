<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → PowerPoint 変換</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "メイリオ", Meiryo, "Yu Gothic", sans-serif;
  background: #1e1e2e;
  color: #cdd6f4;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px;
}
h1 { font-size: 1.6rem; margin-bottom: 8px; color: #cba6f7; }
.subtitle { font-size: 0.85rem; color: #6c7086; margin-bottom: 28px; }

#drop-zone {
  width: 100%;
  max-width: 640px;
  border: 2px dashed #585b70;
  border-radius: 12px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: #181825;
  color: #a6adc8;
  font-size: 1rem;
}
#drop-zone:hover, #drop-zone.drag-over {
  border-color: #cba6f7;
  background: #1e1e2e;
  color: #cba6f7;
}
#drop-zone .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
#file-input { display: none; }

.options {
  display: flex;
  gap: 16px;
  margin-top: 20px;
  flex-wrap: wrap;
  max-width: 640px;
  width: 100%;
}
.opt-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9rem;
  cursor: pointer;
  color: #a6adc8;
}
.opt-label input[type=checkbox] { accent-color: #cba6f7; width: 16px; height: 16px; }

.progress-wrap {
  width: 100%;
  max-width: 640px;
  margin-top: 24px;
  display: none;
}
.progress-bar-bg {
  background: #313244;
  border-radius: 6px;
  height: 10px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #cba6f7, #89b4fa);
  border-radius: 6px;
  width: 0%;
  transition: width .3s;
}
.progress-text { font-size: 0.85rem; color: #6c7086; text-align: right; }

#log {
  width: 100%;
  max-width: 640px;
  margin-top: 16px;
  background: #11111b;
  border-radius: 8px;
  padding: 16px;
  font-family: "Consolas", monospace;
  font-size: 0.8rem;
  height: 260px;
  overflow-y: auto;
  display: none;
  line-height: 1.6;
  color: #a6e3a1;
}
#log .err { color: #f38ba8; }
#log .info { color: #89dceb; }
#log .warn { color: #f9e2af; }
#log .sep { color: #585b70; }

.btn-wrap { margin-top: 20px; display: none; }
#btn-download {
  background: #a6e3a1;
  color: #1e1e2e;
  border: none;
  border-radius: 8px;
  padding: 10px 28px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
}
#btn-download:hover { background: #94e2d5; }

.warn-box {
  width: 100%;
  max-width: 640px;
  margin-top: 20px;
  padding: 12px 16px;
  border-radius: 8px;
  background: #1e1e2e;
  border: 1px solid #f9e2af44;
  font-size: 0.8rem;
  color: #f9e2af;
  display: none;
}
</style>
</head>
<body>

<h1>PDF → PowerPoint 変換</h1>
<p class="subtitle">ブラウザ完結 / サーバー送信なし / OCRモデルは初回のみ取得・以降はオフライン動作</p>

<div id="drop-zone">
  <span class="icon">📄</span>
  PDFファイルをここにドロップ<br>
  <small style="color:#585b70;margin-top:8px;display:block">または クリックしてファイルを選択</small>
</div>
<input type="file" id="file-input" accept=".pdf">

<div class="options">
  <label class="opt-label">
    <input type="checkbox" id="ocr-enabled" checked>
    テキストをOCRで抽出してPPTXに配置する（日本語対応）
  </label>
  <label class="opt-label">
    <input type="checkbox" id="use-pdftext" checked>
    PDF内蔵テキストを優先使用（ベクタPDF高精度）
  </label>
  <label class="opt-label">
    <input type="checkbox" id="transparent-bg" checked>
    図形ブロックの背景を透過する
  </label>
</div>

<div class="warn-box" id="warn-box">
  ⏳ OCR モデルを読み込み中... 初回のみ数十秒かかります。
</div>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-text" id="progress-text">0 / 0 ページ</div>
</div>

<div id="log"></div>

<div class="btn-wrap" id="btn-wrap">
  <button id="btn-download">⬇ PPTXをダウンロード</button>
</div>

<!-- Service Worker: OCR モデルをオフラインキャッシュ（http:// 環境のみ有効） -->
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});</script>

<!-- ライブラリ: lib/ にある場合はローカル優先、なければ CDN -->
<script src="lib/pdf.min.js"
  onerror="var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=function(){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';};document.head.appendChild(s);"></script>
<script src="lib/pptxgen.bundle.js"
  onerror="var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';document.head.appendChild(s);"></script>
<!-- Transformers.js は dynamic import で読み込む（OCR 初期化時） -->

<script>
"use strict";

// ─── 定数 ───────────────────────────────────────────────────────────────────
const RASTER_TARGET_WIDTH = 2048;
const NON_WHITE_THR       = 238;
const BLOCK_GAP           = 10;
const MIN_BLOCK_AREA      = 50;
const TEXT_PAD_RATIO      = 0.15;
const BG_MARGIN           = 8;

const FONT_SIZES = [6,7,8,9,10,10.5,11,12,14,16,18,20,
                    24,28,32,36,40,44,48,54,60,66,72,80,88,96];

// ─── ユーティリティ ──────────────────────────────────────────────────────────
function snapFontSize(pt) {
  return FONT_SIZES.reduce((a, b) => Math.abs(b - pt) < Math.abs(a - pt) ? b : a);
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function medianChannel(arr) {
  if (arr.length === 0) return 0;
  const s = [...arr].sort((a, b) => a - b);
  return s[Math.floor(s.length / 2)];
}
function pixelsInRect(data, x0, y0, x1, y1, W) {
  x0 = x0 | 0; y0 = y0 | 0; x1 = x1 | 0; y1 = y1 | 0;
  const px = [];
  for (let y = y0; y < y1; y++)
    for (let x = x0; x < x1; x++) {
      const i = (y * W + x) * 4;
      px.push([data[i], data[i+1], data[i+2]]);
    }
  return px;
}

// ─── テキスト色推定 ──────────────────────────────────────────────────────────
function getTextColor(data, x0, y0, x1, y1, W) {
  const px = pixelsInRect(data, clamp(x0,0,W-1), y0, clamp(x1,0,W), y1, W);
  if (px.length === 0) return '000000';
  const lums = px.map(([r,g,b]) => (r + g + b) / 3);
  const avgLum = lums.reduce((a,b) => a+b) / lums.length;
  let filtered;
  if (avgLum < 128) {
    filtered = px.filter((_,i) => lums[i] > 160);
    if (filtered.length === 0) return 'FFFFFF';
  } else {
    filtered = px.filter((_,i) => lums[i] < 160);
    if (filtered.length === 0) return '000000';
  }
  const r = medianChannel(filtered.map(p => p[0]));
  const g = medianChannel(filtered.map(p => p[1]));
  const b = medianChannel(filtered.map(p => p[2]));
  return [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('').toUpperCase();
}

// ─── 背景色サンプリング ──────────────────────────────────────────────────────
function sampleBgColor(data, x0, y0, x1, y1, W, H) {
  const m = BG_MARGIN;
  const samples = [];
  const push = (x, y) => {
    const i = (clamp(y,0,H-1) * W + clamp(x,0,W-1)) * 4;
    samples.push([data[i], data[i+1], data[i+2]]);
  };
  const ty = Math.max(0, y0-m), by = Math.min(H-1, y1+m);
  const lx = Math.max(0, x0-m), rx = Math.min(W-1, x1+m);
  for (let x = x0; x < x1; x++) { push(x, ty); push(x, by); }
  for (let y = y0; y < y1; y++) { push(lx, y); push(rx, y); }
  if (samples.length === 0) return [255,255,255];
  return [
    medianChannel(samples.map(p => p[0])),
    medianChannel(samples.map(p => p[1])),
    medianChannel(samples.map(p => p[2])),
  ];
}

// ─── テキストマスキング（修正済み）────────────────────────────────────────────
// バグ修正: protectフラグはOCR行の「内部」を保護していた（逆）→ 削除し各行を直接塗りつぶす
function maskText(ctx, origData, rows, W, H) {
  if (rows.length === 0) return;
  const pads = rows.map(r => Math.max(1, Math.round((r.y1_px - r.y0_px) * TEXT_PAD_RATIO)));
  const data = new Uint8ClampedArray(origData);  // origData を複製して加工（元データ保持）

  for (let ri = 0; ri < rows.length; ri++) {
    const row = rows[ri];
    const p = pads[ri];
    const x0 = clamp(row.x0_px - p, 0, W) | 0;
    const y0 = clamp(row.y0_px - p, 0, H) | 0;
    const x1 = clamp(row.x1_px + p, 0, W) | 0;
    const y1 = clamp(row.y1_px + p, 0, H) | 0;
    const [br, bg, bb] = sampleBgColor(origData, x0, y0, x1, y1, W, H);
    for (let y = y0; y < y1; y++) {
      for (let x = x0; x < x1; x++) {
        const i = (y * W + x) * 4;
        data[i]   = br;
        data[i+1] = bg;
        data[i+2] = bb;
        data[i+3] = 255;
      }
    }
  }
  ctx.putImageData(new ImageData(data, W, H), 0, 0);
}

// ─── 画像ブロック検出 ────────────────────────────────────────────────────────
function findSegments(binary1d, gap) {
  const idx = [];
  for (let i = 0; i < binary1d.length; i++) if (binary1d[i]) idx.push(i);
  if (idx.length === 0) return [];
  const segs = [];
  let start = idx[0], prev = idx[0];
  for (let i = 1; i < idx.length; i++) {
    if (idx[i] - prev > gap) { segs.push([start, prev]); start = idx[i]; }
    prev = idx[i];
  }
  segs.push([start, prev]);
  return segs;
}

function mergeBlocks(blocks, gap) {
  if (blocks.length === 0) return [];
  blocks = [...blocks].sort((a,b) => a[1]-b[1] || a[0]-b[0]);
  const merged = [[...blocks[0]]];
  for (const b of blocks.slice(1)) {
    const last = merged[merged.length - 1];
    if (b[0] <= last[2]+gap && b[2] >= last[0]-gap &&
        b[1] <= last[3]+gap && b[3] >= last[1]-gap) {
      last[0] = Math.min(last[0], b[0]); last[1] = Math.min(last[1], b[1]);
      last[2] = Math.max(last[2], b[2]); last[3] = Math.max(last[3], b[3]);
    } else {
      merged.push([...b]);
    }
  }
  return merged;
}

function detectBlocks(data, W, H) {
  const nw = new Uint8Array(H * W);
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      nw[y*W+x] = (data[i] <= NON_WHITE_THR || data[i+1] <= NON_WHITE_THR || data[i+2] <= NON_WHITE_THR) ? 1 : 0;
    }
  const rowAny = new Uint8Array(H);
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (nw[y*W+x]) { rowAny[y] = 1; break; }

  const rowSegs = findSegments(rowAny, BLOCK_GAP);
  const blocks = [];
  for (const [ry0, ry1] of rowSegs) {
    const colAny = new Uint8Array(W);
    for (let y = ry0; y <= ry1; y++)
      for (let x = 0; x < W; x++)
        if (nw[y*W+x]) colAny[x] = 1;
    for (const [cx0, cx1] of findSegments(colAny, BLOCK_GAP))
      if ((ry1-ry0)*(cx1-cx0) >= MIN_BLOCK_AREA)
        blocks.push([cx0, ry0, cx1, ry1]);
  }
  return mergeBlocks(blocks, BLOCK_GAP);
}

function trimMargins(data, x0, y0, x1, y1, W) {
  let tx0 = x1, ty0 = y1, tx1 = x0, ty1 = y0;
  for (let y = y0; y <= y1; y++)
    for (let x = x0; x <= x1; x++) {
      const i = (y*W+x)*4;
      if (data[i] <= NON_WHITE_THR || data[i+1] <= NON_WHITE_THR || data[i+2] <= NON_WHITE_THR) {
        tx0 = Math.min(tx0, x); ty0 = Math.min(ty0, y);
        tx1 = Math.max(tx1, x); ty1 = Math.max(ty1, y);
      }
    }
  if (tx0 > tx1) return null;
  return [tx0, ty0, tx1+1, ty1+1];
}

function makeTransparentBg(srcCanvas, x0, y0, bw, bh) {
  const off = document.createElement('canvas');
  off.width = bw; off.height = bh;
  const ctx = off.getContext('2d');
  ctx.drawImage(srcCanvas, x0, y0, bw, bh, 0, 0, bw, bh);
  const imgData = ctx.getImageData(0, 0, bw, bh);
  const d = imgData.data;
  const isWhite = pos => {
    const i = pos*4;
    return d[i] > NON_WHITE_THR && d[i+1] > NON_WHITE_THR && d[i+2] > NON_WHITE_THR;
  };
  const visited = new Uint8Array(bw*bh);
  const queue = [];
  for (let x = 0; x < bw; x++) {
    if (isWhite(x))           queue.push(x);
    if (isWhite((bh-1)*bw+x)) queue.push((bh-1)*bw+x);
  }
  for (let y = 0; y < bh; y++) {
    if (isWhite(y*bw))      queue.push(y*bw);
    if (isWhite(y*bw+bw-1)) queue.push(y*bw+bw-1);
  }
  let qi = 0;
  while (qi < queue.length) {
    const pos = queue[qi++];
    if (visited[pos] || !isWhite(pos)) continue;
    visited[pos] = 1;
    d[pos*4+3] = 0;
    const x = pos%bw, y = Math.floor(pos/bw);
    if (x > 0)    queue.push(pos-1);
    if (x < bw-1) queue.push(pos+1);
    if (y > 0)    queue.push(pos-bw);
    if (y < bh-1) queue.push(pos+bw);
  }
  ctx.putImageData(imgData, 0, 0);
  return off;
}

function extractBlocks(canvas, scale, useTransparent) {
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.getImageData(0, 0, W, H);
  const data = imgData.data;
  const rawBlocks = detectBlocks(data, W, H);
  const results = [];
  for (const [bx0, by0, bx1, by1] of rawBlocks) {
    const t = trimMargins(data, bx0, by0, bx1, by1, W);
    if (!t) continue;
    const [tx0, ty0, tx1, ty1] = t;
    const bw = tx1-tx0, bh = ty1-ty0;
    let blockCanvas;
    if (useTransparent) {
      blockCanvas = makeTransparentBg(canvas, tx0, ty0, bw, bh);
    } else {
      blockCanvas = document.createElement('canvas');
      blockCanvas.width = bw; blockCanvas.height = bh;
      blockCanvas.getContext('2d').drawImage(canvas, tx0, ty0, bw, bh, 0, 0, bw, bh);
    }
    results.push({
      dataUrl: blockCanvas.toDataURL('image/png'),
      x0: tx0/scale, y0: ty0/scale,
      x1: tx1/scale, y1: ty1/scale,
    });
  }
  return results;
}

// ─── Transformers.js + TrOCR 初期化 ─────────────────────────────────────────
let ocrPipeline = null;

// Transformers.js CDN URL (lib/ にあればローカル優先)
const TRANSFORMERS_CDN = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js';
const TROCR_MODEL      = 'onnx-community/manga-ocr-base'; // 日本語特化 OCR モデル

async function initPaddleOcr() {
  if (ocrPipeline) return true;
  document.getElementById('warn-box').style.display = 'block';
  try {
    log('OCR モデル読み込み中 (初回のみ数分かかる場合があります)...', 'info');

    // lib/transformers.min.js があればローカル優先
    let importUrl = TRANSFORMERS_CDN;
    try {
      const r = await fetch('lib/transformers.min.js', { method: 'HEAD' });
      if (r.ok) importUrl = 'lib/transformers.min.js';
    } catch(e) {}

    const { pipeline, env } = await import(importUrl);

    // ローカルモデルが lib/models/ にあれば優先使用
    env.allowLocalModels  = true;
    env.localModelPath    = './lib/models/';
    env.allowRemoteModels = true;

    // 進捗ログを 10% 単位に間引く（毎チャンク出力によるスパムを防止）
    const _dlSeen = {};
    ocrPipeline = await pipeline('image-to-text', TROCR_MODEL, {
      progress_callback: (prog) => {
        // v2: status='downloading'  v3: status='download' / status='progress'
        const isDl = prog.status === 'downloading' || prog.status === 'download' || prog.status === 'progress';
        if (!isDl) return;
        const pct = prog.total > 0
          ? Math.round(prog.loaded / prog.total * 100)
          : Math.round(prog.progress ?? 0);
        const key = (prog.file ?? prog.name ?? '');
        const step = Math.floor(pct / 10);
        if (_dlSeen[key] === step) return; // 前回と同じ 10% 台はスキップ
        _dlSeen[key] = step;
        log(`  モデル DL: ${key} ${pct}%`, 'info');
      }
    });

    document.getElementById('warn-box').style.display = 'none';
    log('OCR 初期化完了 (TrOCR)', 'info');
    return true;
  } catch(e) {
    document.getElementById('warn-box').style.display = 'none';
    log(`[WARN] OCR 利用不可: ${e.message}`, 'warn');
    ocrPipeline = null;
    return false;
  }
}

/**
 * 行投影で非白ピクセルが連続する横帯を検出し、テキスト行候補 bbox 配列を返す
 * @returns {{x0,y0,x1,y1}[]}
 */
function detectTextLineRects(imgData, width, height) {
  const data = imgData.data;
  const rowDensity = new Float32Array(height);
  for (let y = 0; y < height; y++) {
    let cnt = 0;
    for (let x = 0; x < width; x++) {
      const i = (y * width + x) * 4;
      const lum = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
      if (lum < NON_WHITE_THR) cnt++;
    }
    rowDensity[y] = cnt / width;
  }

  // 連続した非空行をセグメント化（小ギャップは吸収）
  const LINE_GAP = 4;   // この行数以下のギャップは連結
  const ROW_THR  = 0.003; // 0.3% 以上の非白ピクセルで「行あり」と判定
  const segments = [];
  let start = -1, gap = 0;
  for (let y = 0; y < height; y++) {
    if (rowDensity[y] > ROW_THR) {
      if (start < 0) start = y;
      gap = 0;
    } else if (start >= 0) {
      if (++gap > LINE_GAP) {
        segments.push({ y0: start, y1: y - gap });
        start = -1; gap = 0;
      }
    }
  }
  if (start >= 0) segments.push({ y0: start, y1: height - 1 });

  // 各セグメントの実際のX範囲を取得してパディングを加える
  const PAD = 4;
  return segments.map(seg => {
    let x0 = width, x1 = 0;
    for (let y = seg.y0; y <= seg.y1; y++) {
      for (let x = 0; x < width; x++) {
        const i = (y * width + x) * 4;
        const lum = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        if (lum < NON_WHITE_THR) { if (x < x0) x0 = x; if (x > x1) x1 = x; }
      }
    }
    return {
      x0: Math.max(0, x0 - PAD),
      y0: Math.max(0, seg.y0 - PAD),
      x1: Math.min(width,  x1 + PAD),
      y1: Math.min(height, seg.y1 + PAD)
    };
  }).filter(r => (r.x1 - r.x0) >= 10 && (r.y1 - r.y0) >= 8);
}

// ─── PaddleOCR 結果処理（4点ポリゴン → 軸平行 bbox）────────────────────────
function processOcrResults(items, scale, origData, W, H) {
  // PaddleOCR は items 配列または { text: [...] } を返す
  const arr = Array.isArray(items) ? items : (items?.text ?? []);
  const results = [];
  for (const item of arr) {
    if (!item.text?.trim()) continue;
    if (item.score != null && item.score < 0.5) continue;
    const box = item.box;
    if (!box) continue;
    // box は [[x,y],[x,y],[x,y],[x,y]] または [x,y,x,y,...] のどちらか
    let pts;
    if (Array.isArray(box[0])) {
      pts = box;
    } else {
      // フラット配列 [x0,y0,x1,y1,...] を [[x,y],...] に変換
      pts = [];
      for (let j = 0; j < box.length; j += 2) pts.push([box[j], box[j+1]]);
    }
    const xs = pts.map(p => p[0]);
    const ys = pts.map(p => p[1]);
    const x0_px = Math.max(0, Math.floor(Math.min(...xs)));
    const y0_px = Math.max(0, Math.floor(Math.min(...ys)));
    const x1_px = Math.min(W, Math.ceil(Math.max(...xs)));
    const y1_px = Math.min(H, Math.ceil(Math.max(...ys)));
    if (x1_px <= x0_px || y1_px <= y0_px) continue;
    results.push({
      text:       item.text.trim(),
      score:      item.score ?? 1,
      font_size:  snapFontSize((y1_px - y0_px) / scale),
      font_color: getTextColor(origData, x0_px, y0_px, x1_px, y1_px, W),
      x0_px, y0_px, x1_px, y1_px,
      x0: x0_px / scale, y0: y0_px / scale,
      x1: x1_px / scale, y1: y1_px / scale,
    });
  }
  return results;
}

// ─── PDF内蔵テキスト抽出 ─────────────────────────────────────────────────────
// ベクタPDFには元のテキストデータが埋め込まれており、これを使うと精度100%
async function extractPdfNativeText(page, scale) {
  try {
    const tc = await page.getTextContent();
    const rows = [];
    for (const item of tc.items) {
      if (!item.str || item.str.trim() === '') continue;
      // PDF座標系はY軸が下向き → 変換
      const [, , , , tx, ty] = item.transform;
      const [vw, vh] = [item.width, item.height];
      if (vw <= 0 || vh <= 0) continue;
      // PDF pt 座標 → px 座標（ラスタ座標系）
      const x0_px = tx * scale;
      const y0_px = (page.view[3] - ty - vh) * scale; // Y反転
      const x1_px = (tx + vw) * scale;
      const y1_px = y0_px + vh * scale;
      rows.push({
        text: item.str,
        x0: tx, y0: page.view[3] - ty - vh,
        x1: tx + vw, y1: page.view[3] - ty,
        x0_px, y0_px, x1_px, y1_px,
        font_size: snapFontSize(vh),
      });
    }
    return rows;
  } catch {
    return [];
  }
}

// ─── ログ出力 ────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(msg, cls = '') {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
function logSep() { log('─'.repeat(50), 'sep'); }

// ─── プログレスバー ───────────────────────────────────────────────────────────
function setProgress(cur, total) {
  const pct = total > 0 ? (cur / total * 100).toFixed(0) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${cur} / ${total} ページ`;
}

// ─── メイン処理 ──────────────────────────────────────────────────────────────
let pptxBlob = null;
let outputFileName = 'output.pptx';

async function processPDF(file) {
  pptxBlob = null;
  document.getElementById('btn-wrap').style.display = 'none';
  logEl.style.display = 'block';
  logEl.innerHTML = '';
  document.getElementById('progress-wrap').style.display = 'block';
  setProgress(0, 0);

  const ocrEnabled     = document.getElementById('ocr-enabled').checked;
  const usePdfText     = document.getElementById('use-pdftext').checked;
  const useTransparent = document.getElementById('transparent-bg').checked;

  outputFileName = file.name.replace(/\.pdf$/i, '') + '.pptx';
  log(`処理開始: ${file.name}`, 'info');

  // ─ PDF ロード ─
  let pdf;
  try {
    const buf = await file.arrayBuffer();
    // pdf.js GlobalWorkerOptions
    if (typeof pdfjsLib !== 'undefined') {
      if (!pdfjsLib.GlobalWorkerOptions.workerSrc) {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    } else {
      throw new Error('PDF.js が読み込まれていません');
    }
  } catch (e) {
    log(`[ERROR] PDF 読み込み失敗: ${e.message}`, 'err');
    return;
  }
  const totalPages = pdf.numPages;
  log(`総ページ数: ${totalPages}`);

  // ─ OCR 初期化 ─
  let ocrReady = false;
  if (ocrEnabled) {
    ocrReady = await initPaddleOcr();
    if (!ocrReady) {
      log('[WARN] OCR 利用不可のため OCR をスキップします', 'warn');
    }
  }

  // ─ PPTX 準備 ─
  const pptx = new PptxGenJS();
  let layoutDefined = false;

  // ─ ページループ ─
  for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
    logSep();
    log(`ページ ${pageNum}/${totalPages} 処理中...`, 'info');
    setProgress(pageNum - 1, totalPages);

    const page = await pdf.getPage(pageNum);
    const [, , wPt, hPt] = page.view;
    const scale    = RASTER_TARGET_WIDTH / wPt;
    const viewport = page.getViewport({ scale });

    const canvas  = document.createElement('canvas');
    canvas.width  = Math.round(viewport.width);
    canvas.height = Math.round(viewport.height);
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    const W = canvas.width, H = canvas.height;
    const origData = ctx.getImageData(0, 0, W, H);  // 元画像を一度だけ取得
    log(`  ラスタライズ: ${W}×${H}px  scale=${scale.toFixed(3)}`);

    if (!layoutDefined) {
      const wIn = wPt / 72, hIn = hPt / 72;
      pptx.defineLayout({ name: 'PDF_Layout', width: wIn, height: hIn });
      pptx.layout = 'PDF_Layout';
      layoutDefined = true;
    }

    // ─ テキスト抽出 ─
    let textRows = [];

    // 方法1: PDF内蔵テキスト（ベクタPDF用・高精度）
    if (usePdfText) {
      const nativeRows = await extractPdfNativeText(page, scale);
      if (nativeRows.length > 0) {
        log(`  PDF内蔵テキスト: ${nativeRows.length} 行検出`);
        for (const row of nativeRows) {
          const color = getTextColor(origData.data,
            clamp(Math.round(row.x0_px), 0, W-1),
            clamp(Math.round(row.y0_px), 0, H-1),
            clamp(Math.round(row.x1_px), 0, W),
            clamp(Math.round(row.y1_px), 0, H),
            W);
          textRows.push({ ...row, font_color: color });
        }
      }
    }

    // 方法2: Transformers.js + TrOCR（内蔵テキストがない場合）
    if (ocrReady && ocrPipeline && textRows.length === 0) {
      log('  OCR 実行中 (TrOCR)...', 'info');
      try {
        const lineRects = detectTextLineRects(origData, W, H);
        log(`  テキスト行検出: ${lineRects.length} 件`, 'info');
        const items = [];
        for (const r of lineRects) {
          const lc = document.createElement('canvas');
          lc.width  = r.x1 - r.x0;
          lc.height = r.y1 - r.y0;
          lc.getContext('2d').drawImage(canvas, r.x0, r.y0, lc.width, lc.height, 0, 0, lc.width, lc.height);
          try {
            // canvas → Data URL → Transformers.js pipeline
            const dataURL = lc.toDataURL('image/png');
            const result  = await ocrPipeline(dataURL);
            const text    = (result?.[0]?.generated_text ?? '').trim();
            if (text) {
              items.push({
                text, score: 1.0,
                box: [[r.x0, r.y0], [r.x1, r.y0], [r.x1, r.y1], [r.x0, r.y1]]
              });
            }
          } catch(lineErr) { /* 1行エラーはスキップ */ }
        }
        const ocrRows = processOcrResults(items, scale, origData.data, W, H);
        log(`  OCR: ${ocrRows.length} 行認識`);
        textRows = ocrRows;
      } catch(e) {
        log(`  [WARN] OCR 認識失敗: ${e.message}`, 'warn');
      }
    } else if (textRows.length > 0) {
      log('  PDF内蔵テキストを使用 (OCRスキップ)', 'info');
    }

    log(`  テキスト確定: ${textRows.length} 行`);

    // ─ テキスト領域をマスク（背景塗りつぶし）─
    if (textRows.length > 0) {
      const rowsWithPx = textRows.filter(r =>
        r.x0_px !== undefined && r.y0_px !== undefined);
      if (rowsWithPx.length > 0) {
        maskText(ctx, origData.data, rowsWithPx, W, H);
      }
    }

    // ─ 画像ブロック抽出 ─
    const imgBlocks = extractBlocks(canvas, scale, useTransparent);
    log(`  画像ブロック: ${imgBlocks.length} 件`);

    // ─ スライド構築 ─
    const slide = pptx.addSlide();

    for (const blk of imgBlocks) {
      const wIn = Math.max(blk.x1 - blk.x0, 1) / 72;
      const hIn = Math.max(blk.y1 - blk.y0, 1) / 72;
      slide.addImage({ data: blk.dataUrl, x: blk.x0/72, y: blk.y0/72, w: wIn, h: hIn });
    }

    for (const row of textRows) {
      const wIn = Math.max(row.x1 - row.x0, 1) / 72;
      const hIn = Math.max(row.y1 - row.y0, 1) / 72;
      slide.addText(row.text, {
        x: row.x0 / 72,  y: row.y0 / 72,
        w: wIn,           h: hIn,
        // 日本語フォントスタック: OS標準フォントにフォールバック
        fontFace: 'メイリオ',
        fontSize: row.font_size,
        color:    row.font_color || '000000',
        wrap:     false,
        valign:   'top',
        charSpacing: 0,
      });
    }

    setProgress(pageNum, totalPages);
  }

  // ─ PPTX 保存 ─
  logSep();
  log('PPTX 生成中...', 'info');
  try {
    pptxBlob = await pptx.write({ outputType: 'blob' });
    log(`完了: ${outputFileName}  (${(pptxBlob.size/1024).toFixed(0)} KB)`, 'info');
    document.getElementById('btn-wrap').style.display = 'block';
  } catch (e) {
    log(`[ERROR] PPTX 生成失敗: ${e.message}`, 'err');
  }
}

// ─── UI イベント ─────────────────────────────────────────────────────────────
// PDF.js workerSrc: ローカルがあれば使い、なければCDN
window.addEventListener('load', () => {
  if (typeof pdfjsLib !== 'undefined' && !pdfjsLib.GlobalWorkerOptions.workerSrc) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.min.js';
  }
});

const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) processPDF(e.target.files[0]);
});
dropZone.addEventListener('dragover', e => {
  e.preventDefault(); dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.pdf')) processPDF(f);
  else alert('.pdf ファイルをドロップしてください');
});

document.getElementById('btn-download').addEventListener('click', () => {
  if (!pptxBlob) return;
  const url = URL.createObjectURL(pptxBlob);
  const a = document.createElement('a');
  a.href = url; a.download = outputFileName;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
});
</script>
</body>
