<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → PPTX 変換ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Meiryo', 'Segoe UI', Arial, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
}
.container {
  width: 100%;
  max-width: 700px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  padding: 40px;
}
h1 { color: #1a1a2e; font-size: 24px; margin-bottom: 6px; }
.subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
.drop-zone {
  border: 2px dashed #b0bcd8;
  border-radius: 12px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: #fafbfd;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: #4f6df5;
  background: #f0f3ff;
}
.drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
.drop-zone p { color: #555; font-size: 15px; line-height: 1.7; }
.drop-zone .hint { color: #999; font-size: 12px; margin-top: 8px; }
#fileInput { display: none; }
.file-info {
  display: none;
  margin-top: 14px;
  background: #f0f3ff;
  border: 1px solid #c0ccf5;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 14px;
  color: #333;
}
.file-info span { font-weight: bold; color: #4f6df5; }
.btn {
  display: block;
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: #4f6df5;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover:not(:disabled) { background: #3d5ce0; }
.btn:disabled { background: #b0b8d0; cursor: not-allowed; }
#progress { display: none; margin-top: 24px; }
.progress-bar {
  width: 100%;
  height: 8px;
  background: #e8ecf5;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4f6df5, #7b9ff9);
  border-radius: 4px;
  transition: width 0.3s ease;
  width: 0%;
}
#statusText { font-size: 13px; color: #555; text-align: center; }
.success-banner {
  display: none;
  margin-top: 20px;
  background: #e8f5e9;
  border: 1px solid #81c784;
  border-radius: 8px;
  padding: 14px;
  text-align: center;
  color: #2e7d32;
  font-weight: bold;
  font-size: 15px;
}
#logPanel {
  display: none;
  margin-top: 20px;
  background: #0d1117;
  border-radius: 8px;
  padding: 14px;
  max-height: 240px;
  overflow-y: auto;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.7;
}
#logPanel .l-info  { color: #7ec8a4; }
#logPanel .l-warn  { color: #e0b050; }
#logPanel .l-error { color: #f07070; }
</style>
</head>
<body>
<div class="container">
  <h1>PDF → PPTX 変換ツール</h1>
  <p class="subtitle">テキストを編集可能な状態でPowerPointに変換します（テキスト埋め込み / 画像PDF対応）</p>

  <div class="drop-zone" id="dropZone">
    <div class="icon">📄</div>
    <p>PDFファイルをここにドラッグ＆ドロップ<br>またはクリックして選択</p>
    <p class="hint">テキスト埋め込みPDF → 高精度配置 ／ 画像PDF → Tesseract OCR（jpn+eng）</p>
    <input type="file" id="fileInput" accept=".pdf,application/pdf">
  </div>

  <div class="file-info" id="fileInfo">選択ファイル: <span id="fileName"></span></div>

  <button class="btn" id="convertBtn" disabled>PPTXに変換</button>

  <div id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="statusText">処理中...</div>
  </div>

  <div class="success-banner" id="successBanner">ダウンロードが開始されました！</div>

  <div id="logPanel"></div>
</div>

<!--
  ライブラリ読み込み（CDN）
  ローカル運用時は以下をコメントアウトし lib/ 以下のパスを使用:
    <script src="lib/pdf.min.js"></script>
    <script src="lib/pptxgen.bundle.js"></script>
    <script src="lib/tesseract.min.js"></script>
  ※ pdf.worker は workerSrc で別途指定
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
'use strict';

// ============================================================
// 設定
// ============================================================
const CFG = {
  RENDER_WIDTH:        2048,  // ラスタライズ幅 (px)
  MIN_OCR_HEIGHT:      48,    // OCR前に拡大する最小高さ (px) [BUG FIX #4]
  PDF_TEXT_MIN_CHARS:  5,     // PDF内蔵テキストとみなす最低文字数
  WHITE_TH:            240,   // 「白」とみなすRGB値の下限
  IMG_MIN_SIZE:        20,    // 画像ブロックの最小辺長 (px)

  // テキスト行フィルタ [BUG FIX #3: w < h 廃止 → w >= h*0.4]
  LINE_MIN_H:          8,
  LINE_MAX_H:          300,
  LINE_MIN_DENSITY:    0.02,
  LINE_MAX_DENSITY:    0.80,
  LINE_MIN_W_RATIO:    0.4,   // w >= h * LINE_MIN_W_RATIO

  // ギャップ閾値
  BLOCK_ROW_GAP:       10,    // 外側バンド検出（行方向）
  LINE_ROW_GAP:        3,     // 行分割（3px gap segmentation）
  IMG_ROW_GAP:         10,    // 画像バンド検出
  IMG_COL_GAP:         10,    // 画像列グループ検出
};

// PDF.js ワーカー
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ============================================================
// UI
// ============================================================
const $  = id => document.getElementById(id);
const dropZone     = $('dropZone');
const fileInput    = $('fileInput');
const convertBtn   = $('convertBtn');
const fileInfo     = $('fileInfo');
const fileNameEl   = $('fileName');
const progressEl   = $('progress');
const progressFill = $('progressFill');
const statusText   = $('statusText');
const logPanel     = $('logPanel');
const successBanner= $('successBanner');

let selectedFile = null;
let ocrWorker    = null;

function log(msg, type = 'info') {
  logPanel.style.display = 'block';
  const d = document.createElement('div');
  d.className = 'l-' + type;
  d.textContent = msg;
  logPanel.appendChild(d);
  logPanel.scrollTop = logPanel.scrollHeight;
}

function setProgress(pct, msg) {
  progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
  if (msg) statusText.textContent = msg;
}

// ---- ファイル選択 ----
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); });

function selectFile(file) {
  selectedFile = file;
  fileNameEl.textContent = file.name;
  fileInfo.style.display = 'block';
  convertBtn.disabled = false;
  successBanner.style.display = 'none';
  logPanel.innerHTML = '';
  logPanel.style.display = 'none';
}

// ---- 変換ボタン ----
convertBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  convertBtn.disabled = true;
  progressEl.style.display = 'block';
  successBanner.style.display = 'none';
  logPanel.innerHTML = '';
  logPanel.style.display = 'none';

  try {
    await convertPDF(selectedFile);
    successBanner.style.display = 'block';
  } catch (err) {
    log('変換失敗: ' + err.message, 'error');
    console.error(err);
    setProgress(0, '変換失敗');
  } finally {
    convertBtn.disabled = false;
    if (ocrWorker) {
      await ocrWorker.terminate().catch(() => {});
      ocrWorker = null;
    }
  }
});

// ============================================================
// メイン変換処理
// ============================================================
async function convertPDF(file) {
  log('PDF読み込み中...');
  setProgress(2, 'PDF読み込み中...');
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const N   = pdf.numPages;
  log(`ページ数: ${N}`);

  // Tesseract ワーカー初期化 [BUG FIX #1: MangaOCR → Tesseract.js jpn+eng]
  log('OCRエンジン初期化中 (jpn+eng)...');
  setProgress(5, 'OCRエンジン初期化中...');
  ocrWorker = await Tesseract.createWorker(['jpn', 'eng'], 1, {
    logger: () => {}   // verbose ログを抑制
  });
  log('OCRエンジン準備完了');

  // 最初のページでスライドサイズを決定
  const firstPage = await pdf.getPage(1);
  const vp0  = firstPage.getViewport({ scale: 1 });
  const slideW = round4(vp0.width  / 72);   // PDF points → inches
  const slideH = round4(vp0.height / 72);
  log(`スライドサイズ: ${slideW.toFixed(2)}" × ${slideH.toFixed(2)}"`);

  const pptx = new PptxGenJS();
  pptx.defineLayout({ name: 'PDF', width: slideW, height: slideH });
  pptx.layout = 'PDF';

  for (let p = 1; p <= N; p++) {
    setProgress(5 + (p - 1) / N * 90, `ページ ${p}/${N} 処理中...`);
    log(`\n▶ ページ ${p}/${N}`);
    await processPage(pdf, p, pptx, slideW, slideH);
  }

  setProgress(97, 'PPTXファイル生成中...');
  log('PPTXファイル生成中...');
  await pptx.writeFile({ fileName: file.name.replace(/\.pdf$/i, '') + '.pptx' });
  setProgress(100, '変換完了！');
  log('✓ 変換完了');
}

// ============================================================
// ページ処理
// ============================================================
async function processPage(pdf, pageNum, pptx, slideW, slideH) {
  const page = await pdf.getPage(pageNum);
  const vp   = page.getViewport({ scale: 1 });
  const pageW = vp.width;    // PDF points
  const pageH = vp.height;   // PDF points

  // ラスタライズ
  const scale = CFG.RENDER_WIDTH / pageW;
  const cW = Math.round(pageW * scale);
  const cH = Math.round(pageH * scale);

  const canvas = document.createElement('canvas');
  canvas.width  = cW;
  canvas.height = cH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, cW, cH);
  await page.render({ canvasContext: ctx, viewport: page.getViewport({ scale }) }).promise;
  log(`  レンダリング: ${cW}×${cH}px`);

  const slide = pptx.addSlide();
  slide.background = { color: 'FFFFFF' };

  // ----------------------------------------------------------
  // テキスト抽出（優先: PDF内蔵 → フォールバック: Tesseract OCR）
  // ----------------------------------------------------------
  let useOCR = false;
  let pdfItems = [];

  try {
    const tc      = await page.getTextContent();
    const items   = tc.items.filter(i => i.str && i.str.trim().length > 0);
    const nChars  = items.reduce((s, i) => s + i.str.length, 0);
    log(`  PDF内蔵テキスト: ${items.length}アイテム (${nChars}文字)`);

    if (nChars >= CFG.PDF_TEXT_MIN_CHARS) {
      pdfItems = items;
    } else {
      useOCR = true;
      log('  → 内蔵テキスト不足: OCRにフォールバック');
    }
  } catch (e) {
    useOCR = true;
    log(`  → テキスト取得エラー (OCRへ): ${e.message}`, 'warn');
  }

  // ----------------------------------------------------------
  // PDF内蔵テキストパス
  // ----------------------------------------------------------
  if (!useOCR) {
    // テキスト領域を白塗りマスク [BUG FIX #2: protectロジック廃止・直接塗りつぶし]
    maskPDFItems(ctx, pdfItems, pageH, scale);

    let placed = 0;
    for (const item of pdfItems) {
      if (item.str.trim() && addPDFText(slide, item, pageH, slideW, slideH)) placed++;
    }
    log(`  テキストボックス配置: ${placed}個`);
  }

  // ----------------------------------------------------------
  // OCRパス
  // ----------------------------------------------------------
  if (useOCR) {
    const origData = ctx.getImageData(0, 0, cW, cH);
    const blocks   = detectTextBlocks(origData, cW, cH);
    log(`  テキストブロック検出: ${blocks.length}個`);

    let ocrCount = 0;
    for (const blk of blocks) {
      const text = await ocrBlock(canvas, blk);
      if (!text) continue;

      // マスク [BUG FIX #2: 直接白塗り、protectなし]
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(blk.x, blk.y, blk.w, blk.h);

      // px → inches
      const x  = (blk.x / cW) * slideW;
      const y  = (blk.y / cH) * slideH;
      const w  = (blk.w / cW) * slideW;
      const h  = (blk.h / cH) * slideH;
      const fs = Math.max(6, Math.round(blk.h / scale * 0.72));

      if (w > 0.01 && h > 0.01) {
        slide.addText(text, {
          x: clamp(x, 0, slideW - 0.01),
          y: clamp(y, 0, slideH - 0.01),
          w: Math.min(w, slideW - clamp(x, 0, slideW)),
          h: Math.min(h, slideH - clamp(y, 0, slideH)),
          fontSize:  fs,
          fontFace:  'Meiryo',
          color:     '000000',
          wrap:      true,
          valign:    'top',
          margin:    0,
        });
        ocrCount++;
      }
    }
    log(`  OCRテキスト配置: ${ocrCount}個`);
  }

  // ----------------------------------------------------------
  // 残存非白領域 → 画像ブロックとして抽出・配置
  // ----------------------------------------------------------
  const maskedData = ctx.getImageData(0, 0, cW, cH);
  const imgBlocks  = detectImageBlocks(maskedData, cW, cH);
  log(`  画像ブロック検出: ${imgBlocks.length}個`);

  let imgCount = 0;
  for (const blk of imgBlocks) {
    if (blk.w < CFG.IMG_MIN_SIZE || blk.h < CFG.IMG_MIN_SIZE) continue;

    const tc = document.createElement('canvas');
    tc.width  = blk.w;
    tc.height = blk.h;
    tc.getContext('2d').drawImage(canvas, blk.x, blk.y, blk.w, blk.h, 0, 0, blk.w, blk.h);

    const x = (blk.x / cW) * slideW;
    const y = (blk.y / cH) * slideH;
    const w = (blk.w / cW) * slideW;
    const h = (blk.h / cH) * slideH;

    if (w > 0.01 && h > 0.01) {
      slide.addImage({
        data: tc.toDataURL('image/png'),
        x: clamp(x, 0, slideW - 0.01),
        y: clamp(y, 0, slideH - 0.01),
        w: Math.min(w, slideW),
        h: Math.min(h, slideH),
      });
      imgCount++;
    }
  }
  log(`  画像ブロック配置: ${imgCount}個`);
}

// ============================================================
// PDF内蔵テキスト: キャンバス上の白塗りマスク
// BUG FIX #2 - protectフラグなし、各テキスト行を直接背景色で塗りつぶす
// ============================================================
function maskPDFItems(ctx, items, pageH, scale) {
  ctx.fillStyle = '#FFFFFF';
  for (const item of items) {
    if (!item.str.trim()) continue;
    const [, , c, d, tx, ty] = item.transform;
    const fontH = Math.sqrt(c * c + d * d);              // PDF points
    const itemW = Math.max(item.width, fontH * 0.5);

    // PDF座標(下原点) → キャンバス座標(上原点)
    const cx = tx * scale;
    const cy = (pageH - ty - fontH) * scale;
    const cw = itemW * scale;
    const ch = fontH * scale * 1.6;

    ctx.fillRect(
      Math.floor(cx - 2),
      Math.floor(cy - 2),
      Math.ceil(cw + 4),
      Math.ceil(ch + 4)
    );
  }
}

// ============================================================
// PDF内蔵テキスト: PPTXスライドにテキストボックスを追加
// ============================================================
function addPDFText(slide, item, pageH, slideW, slideH) {
  const [, , c, d, tx, ty] = item.transform;
  const fontH = Math.sqrt(c * c + d * d);   // PDF points
  if (fontH < 1) return false;

  const itemW = Math.max(item.width, fontH * 0.5);

  // PDF points → inches (1 pt = 1/72 inch)
  const x  = tx / 72;
  const y  = (pageH - ty - fontH * 1.2) / 72;
  const w  = itemW / 72;
  const h  = fontH * 1.6 / 72;
  const fs = Math.max(6, Math.round(fontH * 0.9));

  if (x > slideW + 0.5 || y > slideH + 0.5 || w < 0.01 || h < 0.01) return false;

  slide.addText(item.str, {
    x:        clamp(x, 0, slideW - 0.01),
    y:        clamp(y, 0, slideH - 0.01),
    w:        clamp(w, 0.05, slideW),
    h:        clamp(h, 0.05, slideH),
    fontSize: fs,
    fontFace: 'Meiryo',
    color:    '000000',
    wrap:     false,
    autoFit:  false,
    valign:   'middle',
    margin:   0,
  });
  return true;
}

// ============================================================
// OCR用テキストブロック検出
// 処理: 行方向投影 → バンド検出 → 行分割(3px gap) → isLikelyTextLine フィルタ
// ============================================================
function detectTextBlocks(imageData, W, H) {
  const data = imageData.data;

  // 行ごとの非白ピクセル数
  const rowCount = new Int32Array(H);
  for (let y = 0; y < H; y++) {
    let base = y * W * 4;
    for (let x = 0; x < W; x++, base += 4) {
      if (data[base] < CFG.WHITE_TH || data[base+1] < CFG.WHITE_TH || data[base+2] < CFG.WHITE_TH) {
        rowCount[y]++;
      }
    }
  }

  // 外側バンド検出（行ギャップ <= BLOCK_ROW_GAP で同一バンド）
  const bands = groupByGap(rowCount, H, CFG.BLOCK_ROW_GAP, 1);

  // 各バンド内で行分割 → テキスト行フィルタ
  const blocks = [];
  for (const band of bands) {
    const lines = splitIntoLines(data, W, rowCount, band);
    for (const line of lines) {
      if (isLikelyTextLine(data, W, line)) blocks.push(line);
    }
  }
  return blocks;
}

// 連続する「値 >= minVal」の行をギャップ閾値でグループ化
function groupByGap(rowCount, H, gapTh, minVal) {
  const groups = [];
  let start = -1, gap = 0;
  for (let y = 0; y < H; y++) {
    if (rowCount[y] >= minVal) {
      if (start === -1) start = y;
      gap = 0;
    } else if (start !== -1) {
      gap++;
      if (gap > gapTh) {
        groups.push({ y: start, h: y - gap - start });
        start = -1; gap = 0;
      }
    }
  }
  if (start !== -1) groups.push({ y: start, h: H - start });
  return groups;
}

// バンド内を 3px gap segmentation で行に分割し X方向の範囲を付与
function splitIntoLines(data, W, rowCount, band) {
  const lines = [];
  let start = -1, gap = 0;

  for (let y = band.y; y < band.y + band.h; y++) {
    if (rowCount[y] > 0) {
      if (start === -1) start = y;
      gap = 0;
    } else if (start !== -1) {
      gap++;
      if (gap >= CFG.LINE_ROW_GAP) {
        const h = y - gap - start + 1;
        if (h > 0) {
          const { x, w } = xExtent(data, W, start, h);
          if (w > 0) lines.push({ x, y: start, w, h });
        }
        start = -1; gap = 0;
      }
    }
  }
  if (start !== -1) {
    const h = band.y + band.h - start;
    const { x, w } = xExtent(data, W, start, h);
    if (w > 0) lines.push({ x, y: start, w, h });
  }
  return lines;
}

// 指定行範囲の X方向非白ピクセル範囲
function xExtent(data, W, y, h) {
  let minX = W, maxX = -1;
  for (let row = y; row < y + h; row++) {
    let base = row * W * 4;
    for (let x = 0; x < W; x++, base += 4) {
      if (data[base] < CFG.WHITE_TH || data[base+1] < CFG.WHITE_TH || data[base+2] < CFG.WHITE_TH) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
      }
    }
  }
  if (maxX < 0) return { x: 0, w: 0 };
  return { x: minX, w: maxX - minX + 1 };
}

// テキスト行らしいか判定
// BUG FIX #3: w < h 条件廃止 → w >= h * LINE_MIN_W_RATIO (0.4) に変更
//             （日本語文字は正方形に近く w < h で除外されていたため）
function isLikelyTextLine(data, W, { x, y, w, h }) {
  // 高さフィルタ
  if (h < CFG.LINE_MIN_H || h > CFG.LINE_MAX_H) return false;
  // 幅フィルタ [BUG FIX #3]
  if (w < h * CFG.LINE_MIN_W_RATIO) return false;

  // ピクセル密度フィルタ
  let nonWhite = 0;
  for (let row = y; row < y + h; row++) {
    let base = (row * W + x) * 4;
    for (let col = x; col < x + w; col++, base += 4) {
      if (col < 0 || col >= W) continue;
      if (data[base] < CFG.WHITE_TH || data[base+1] < CFG.WHITE_TH || data[base+2] < CFG.WHITE_TH) {
        nonWhite++;
      }
    }
  }
  const density = nonWhite / (w * h);
  return density >= CFG.LINE_MIN_DENSITY && density <= CFG.LINE_MAX_DENSITY;
}

// ============================================================
// OCR実行
// BUG FIX #4: 高さが MIN_OCR_HEIGHT (48px) 未満の場合は拡大してから認識
// ============================================================
async function ocrBlock(canvas, blk) {
  const { x, y, w, h } = blk;

  let dw = w, dh = h;
  if (h < CFG.MIN_OCR_HEIGHT) {
    const s = CFG.MIN_OCR_HEIGHT / h;
    dw = Math.round(w * s);
    dh = CFG.MIN_OCR_HEIGHT;
  }

  const tmp = document.createElement('canvas');
  tmp.width  = dw;
  tmp.height = dh;
  const tc = tmp.getContext('2d');
  tc.fillStyle = '#FFFFFF';
  tc.fillRect(0, 0, dw, dh);
  tc.drawImage(canvas, x, y, w, h, 0, 0, dw, dh);

  try {
    const { data } = await ocrWorker.recognize(tmp);
    const text = data.text.trim();
    return text.length > 0 ? text : null;
  } catch (e) {
    log(`  OCR失敗 (${x},${y}): ${e.message}`, 'warn');
    return null;
  }
}

// ============================================================
// 画像ブロック検出（テキストマスク済みキャンバスから）
// ============================================================
function detectImageBlocks(imageData, W, H) {
  const data = imageData.data;

  // 行ごとの非白ピクセル有無
  const rowActive = new Uint8Array(H);
  for (let y = 0; y < H; y++) {
    let base = y * W * 4;
    for (let x = 0; x < W; x++, base += 4) {
      if (data[base] < CFG.WHITE_TH || data[base+1] < CFG.WHITE_TH || data[base+2] < CFG.WHITE_TH) {
        rowActive[y] = 1; break;
      }
    }
  }

  // 水平バンド検出（ギャップ <= IMG_ROW_GAP で同一バンド）
  const bands = groupByGap(rowActive, H, CFG.IMG_ROW_GAP, 1);

  const blocks = [];
  for (const band of bands) {
    if (band.h < CFG.IMG_MIN_SIZE) continue;

    // 列方向の非白ピクセル有無
    const colActive = new Uint8Array(W);
    for (let y = band.y; y < band.y + band.h; y++) {
      let base = y * W * 4;
      for (let x = 0; x < W; x++, base += 4) {
        if (!colActive[x] &&
            (data[base] < CFG.WHITE_TH || data[base+1] < CFG.WHITE_TH || data[base+2] < CFG.WHITE_TH)) {
          colActive[x] = 1;
        }
      }
    }

    // 列グループ検出（ギャップ <= IMG_COL_GAP で同一グループ）
    let cs = -1, cg = 0;
    for (let x = 0; x < W; x++) {
      if (colActive[x]) {
        if (cs === -1) cs = x;
        cg = 0;
      } else if (cs !== -1) {
        cg++;
        if (cg > CFG.IMG_COL_GAP) {
          const bw = x - cg - cs;
          if (bw >= CFG.IMG_MIN_SIZE) blocks.push({ x: cs, y: band.y, w: bw, h: band.h });
          cs = -1; cg = 0;
        }
      }
    }
    if (cs !== -1) {
      const bw = W - cs;
      if (bw >= CFG.IMG_MIN_SIZE) blocks.push({ x: cs, y: band.y, w: bw, h: band.h });
    }
  }
  return blocks;
}

// ============================================================
// ユーティリティ
// ============================================================
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function round4(v) { return Math.round(v * 10000) / 10000; }
